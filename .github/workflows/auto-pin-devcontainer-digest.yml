name: Auto-pin devcontainer image digest

on:
  workflow_run:
    workflows: ["Build and publish devcontainer base image"]
    types: [completed]

permissions:
  contents: write
  packages: read

jobs:
  pin-digest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get digest for :latest
        id: get_digest
        run: |
          set -euo pipefail
          echo "Fetching manifest headers for latest..."
          headers=$(curl -sI -H "Accept: application/vnd.docker.distribution.manifest.v2+json" -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "https://ghcr.io/v2/greencodeerp-bit/odoo-devcontainer-base/manifests/latest")
          echo "$headers"
          digest=$(echo "$headers" | tr -d '\r' | grep -i Docker-Content-Digest | awk '{print $2}')
          if [ -z "$digest" ]; then
            echo "Digest not found in headers"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Update .devcontainer/devcontainer.json
        id: update_file
        run: |
          set -euo pipefail
          digest=${{ steps.get_digest.outputs.digest }}
          echo "Updating .devcontainer/devcontainer.json to use @$digest"
          python - <<'PY'
import json
p='.devcontainer/devcontainer.json'
with open(p,'r',encoding='utf-8') as f:
    data=json.load(f)
img=data.get('image','')
if '@' in img:
    base=img.split('@')[0]
elif ':' in img:
    base=img.split(':')[0]
else:
    base=img
data['image']=f"{base}@{__import__('os').environ['DIGEST']}"
with open(p,'w',encoding='utf-8') as f:
    json.dump(data,f,indent=2)
print('written')
PY
        env:
          DIGEST: ${{ steps.get_digest.outputs.digest }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci(devcontainer): pin image to ${{ steps.get_digest.outputs.digest }}"
          branch: "devcontainer/auto-pin-${{ github.run_id }}"
          title: "ci: pin devcontainer image to ${{ steps.get_digest.outputs.digest }}"
          body: |
            Automated update of `.devcontainer/devcontainer.json` to pin the devcontainer image to the digest produced by the latest build.
          base: 18.0

      - name: Auto-merge created PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: "devcontainer/auto-pin-${{ github.run_id }}"
        run: |
          set -euo pipefail
          echo "Looking up PR for branch $BRANCH"
          pr=$(gh pr list --repo ${{ github.repository }} --head $BRANCH --json number --jq '.[0].number') || true
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "PR not found, exiting"
            exit 0
          fi
          echo "Found PR #$pr - attempting merge"
          # Try to merge with gh (default merge), prefer squash
          gh pr merge $pr --repo ${{ github.repository }} --squash --admin || {
            echo "gh pr squash merge failed, trying REST API squash"
            curl -s -X PUT -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/pulls/$pr/merge" -d '{"commit_title":"ci: auto-merge pin devcontainer image","merge_method":"squash"}'
          }

          # After merge, add label and a comment to the PR
          echo "Adding label auto-merged and comment to PR #$pr"
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/issues/$pr/labels" -d '["auto-merged"]' || true
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          DIGEST="${{ steps.get_digest.outputs.digest }}"
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/issues/$pr/comments" -d "{\"body\":\"This PR was automatically merged by the auto-pin workflow.\n\n- Digest: $DIGEST\n- Build run: $RUN_URL\n\nLabeled as `auto-merged`.\"}" || true

            # Fetch merge commit SHA and create a changelog entry
            echo "Fetching merge commit SHA for PR #$pr"
            merge_sha=$(gh api repos/${{ github.repository }}/pulls/$pr --jq '.merge_commit_sha') || true
            if [ -n "$merge_sha" ] && [ "$merge_sha" != "null" ]; then
              commit_url="https://github.com/${{ github.repository }}/commit/$merge_sha"
            else
              commit_url=""
            fi

            echo "Preparing changelog entry"
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            ENTRY="- $NOW  Digest: $DIGEST  Run: $RUN_URL  Commit: $commit_url\n"

            # Create a branch, append the entry to doc/DEVCONTAINER_CHANGES.md and create a PR
            BRANCH="devcontainer/chlog-${{ github.run_id }}"
            git config user.name "github-actions[bot]" || true
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com" || true
            git checkout -b $BRANCH
            mkdir -p doc
            FILE=doc/DEVCONTAINER_CHANGES.md
            if [ ! -f "$FILE" ]; then
              echo "# Devcontainer changelog" > "$FILE"
              echo >> "$FILE"
            fi
            echo "$ENTRY" >> "$FILE"
            git add "$FILE"
            git commit -m "chore(devcontainer): add changelog entry for $DIGEST" || true
            git push --set-upstream origin $BRANCH

            echo "Creating PR for changelog update"
            gh pr create --repo ${{ github.repository }} --title "chore: devcontainer changelog $DIGEST" --body "Automated changelog entry: $DIGEST\nRun: $RUN_URL" --base 18.0 --head $BRANCH || true
            pr2=$(gh pr list --repo ${{ github.repository }} --head $BRANCH --json number --jq '.[0].number') || true
            if [ -n "$pr2" ] && [ "$pr2" != "null" ]; then
              gh pr merge $pr2 --repo ${{ github.repository }} --squash --admin || true
            fi
